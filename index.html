<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blog</title>
<script>
  (function () {
    var stored = localStorage.getItem("theme");
    var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <a href="#/" class="sidebar__brand">
      <span class="sidebar__title">My Blog</span>
    </a>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="라이트/다크 모드 전환">🌓</button>
  </aside>
  <div class="content-area">
    <main id="app" class="site-main"></main>
    <footer class="site-footer">
      <p>&copy; 2026 My Blog</p>
    </footer>
  </div>
</div>
<script src="posts/posts-data.js"></script>
<script src="js/dom.js"></script>
<script src="js/theme.js"></script>
<script src="js/postsApi.js"></script>
<script src="js/views/listView.js"></script>
<script src="js/views/postView.js"></script>
<script src="js/router.js"></script>
<script src="js/main.js"></script>
</body>
</html>
