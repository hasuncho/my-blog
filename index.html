<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blog</title>
<script>
  (function () {
    var stored = localStorage.getItem("theme");
    var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <a href="#/" class="sidebar__brand">
      <span class="sidebar__title">My Blog</span>
    </a>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="라이트/다크 모드 전환">🌓</button>
  </aside>
  <div class="content-area">
    <main id="app" class="site-main"></main>
    <section class="apps-showcase" aria-labelledby="apps-showcase-title">
      <h2 id="apps-showcase-title" class="apps-showcase__title">미니 웹앱</h2>
      <ul class="apps-showcase__list">
        <li class="app-card">
          <a class="app-card__link" href="apps/2048/index.html" target="_blank" rel="noopener">
            <div class="app-card__preview">
              <iframe src="apps/2048/index.html" title="2048 게임 미리보기" tabindex="-1" aria-hidden="true" loading="lazy"></iframe>
            </div>
            <div class="app-card__body">
              <h3 class="app-card__name">2048</h3>
              <p class="app-card__desc">방향키로 숫자 타일을 밀어서 합치는 퍼즐 게임. 점수판 포함.</p>
            </div>
          </a>
        </li>
      </ul>
    </section>
    <footer class="site-footer">
      <p>&copy; 2026 My Blog</p>
    </footer>
  </div>
</div>
<script src="posts/posts-data.js"></script>
<script src="js/dom.js"></script>
<script src="js/theme.js"></script>
<script src="js/postsApi.js"></script>
<script src="js/views/listView.js"></script>
<script src="js/views/postView.js"></script>
<script src="js/router.js"></script>
<script src="js/main.js"></script>
</body>
</html>
