<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>2048</title>
<meta name="description" content="방향키 또는 스와이프로 타일을 밀어 2048을 만드는 게임" />
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="title">2048</h1>
      <p class="subtitle">같은 숫자 타일을 합쳐 2048을 만들어보세요.</p>
    </header>

    <div class="top-bar">
      <div class="scoreboard" role="group" aria-label="점수판">
        <div class="score-box" aria-label="현재 점수">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="score-value">0</span>
        </div>
        <div class="score-box" aria-label="최고 점수">
          <span class="score-label">BEST</span>
          <span class="score-value" id="best-value">0</span>
        </div>
      </div>
      <div class="controls">
        <button id="new-game-btn" type="button" aria-label="새 게임 시작">새 게임</button>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board-container" id="board-container">
        <div class="grid-background" id="grid-background" aria-hidden="true"></div>
        <div class="tile-layer" id="tile-layer"></div>

        <div class="overlay" id="overlay" hidden>
          <div class="overlay-content">
            <p class="overlay-message" id="overlay-message" role="alert"></p>
            <div class="overlay-actions" id="overlay-actions">
              <button type="button" id="overlay-keep-playing-btn" hidden>계속하기</button>
              <button type="button" id="overlay-restart-btn">새 게임</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="app-footer">
      <p>조작 방법: 방향키(↑ ↓ ← →) 또는 화면을 스와이프하세요.</p>
    </footer>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
