<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Art Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>Pixel Art Editor</h1>
    <p>16x16 격자에 클릭 또는 드래그로 도트를 찍어 그림을 그려보세요.</p>
  </header>

  <main>
    <section class="toolbar">
      <div class="tool-group" role="group" aria-label="도구 선택">
        <button id="tool-pencil" type="button" class="tool-btn" aria-pressed="true">✏️ 연필</button>
        <button id="tool-eraser" type="button" class="tool-btn" aria-pressed="false">🧹 지우개</button>
      </div>
      <div class="tool-group" role="group" aria-label="캔버스 동작">
        <button id="clear-btn" type="button" class="action-btn">🗑️ 전체 지우기</button>
        <button id="download-btn" type="button" class="action-btn primary">⬇️ PNG로 저장</button>
      </div>
    </section>

    <section class="palette" aria-label="색상 팔레트">
      <div class="swatches" id="swatches"></div>
      <div class="palette-side">
        <label class="custom-color">
          커스텀
          <input type="color" id="custom-color-input" value="#ff0000" aria-label="커스텀 색상 선택">
        </label>
        <div class="current-color-preview" id="current-color-preview" aria-label="현재 선택된 색상 미리보기"></div>
      </div>
    </section>

    <section class="canvas-area">
      <div id="pixel-grid" class="pixel-grid" role="grid" aria-label="16x16 픽셀 캔버스"></div>
    </section>
  </main>

  <canvas id="export-canvas" width="256" height="256" hidden></canvas>
  <a id="download-link" hidden></a>

  <footer class="app-footer">
    <p>클릭 또는 드래그로 그리기 · 모바일에서는 손가락으로 터치하여 그릴 수 있습니다.</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
